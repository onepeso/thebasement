name: Release
on:
  push:
    tags:
      - "v*" # Triggers when you push a tag like v1.1.1

jobs:
  publish:
    permissions:
      contents: write
    runs-on: ${{ matrix.platform }}
    # Defining env here makes these variables available to ALL steps in this job
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
    strategy:
      fail-fast: false
      matrix:
        platform: [macos-latest, ubuntu-22.04, windows-latest]

    steps:
      - uses: actions/checkout@v4

      # 1. Install pnpm
      - uses: pnpm/action-setup@v3
        with:
          version: 9

      # 2. Install Node.js
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"

      # 3. Install Rust
      - uses: dtolnay/rust-toolchain@stable

      # 4. Install System Dependencies (Ubuntu only)
      - name: install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libjavascriptcoregtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libsoup-3.0-dev

      - name: install frontend dependencies
        run: pnpm install

      - name: build frontend
        run: pnpm build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}

      # 5. Build and Release
      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        with:
          tagName: v__VERSION__
          releaseName: "App v__VERSION__"
          releaseBody: "New release! Download the installer below."
          releaseDraft: true
